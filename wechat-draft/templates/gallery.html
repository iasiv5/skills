<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - 主题选择</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
}

/* ── Toolbar ── */
.toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 200;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.toolbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
}
.toolbar-title {
    font-size: 15px;
    font-weight: 600;
    color: #1d1d1f;
}
.toolbar-meta {
    font-size: 13px;
    color: #86868b;
}
.toolbar-hint {
    font-size: 13px;
    color: #07c160;
    font-weight: 500;
    text-align: right;
}

/* ── Main Container ── */
.main-container {
    max-width: 1100px;
    margin: 80px auto 40px;
    padding: 0 24px;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 32px;
}

/* ── Sidebar (left panel) ── */
.sidebar {
    width: 360px;
    flex-shrink: 0;
    position: sticky;
    top: 80px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    padding: 16px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

/* ── Preview Panel (right panel) ── */
.preview-panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* ── Theme Buttons ── */
.theme-buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.theme-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.group-label {
    font-size: 11px;
    color: #86868b;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-bottom: 4px;
    border-bottom: 1px solid #f0f0f0;
}
.theme-group-buttons {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
}
.theme-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: #fff;
    border: 1.5px solid #e8e8e8;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
    flex: 1;
    justify-content: center;
}
.theme-btn:hover {
    border-color: #bbb;
    background: #fafafa;
}
.theme-btn.active {
    border-color: #07c160;
    background: rgba(7,193,96,0.06);
    color: #07c160;
}
.theme-btn.recommended {
    position: relative;
}
.theme-btn.recommended .rec-badge {
    position: absolute;
    top: -7px;
    right: -5px;
    background: #ff9500;
    color: #fff;
    font-size: 9px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 5px;
    font-weight: 600;
    pointer-events: none;
}
.theme-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}

/* ── Phone Frame Preview ── */
.phone-frame {
    width: 100%;
    max-width: 415px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    overflow: hidden;
}
.phone-header {
    background: #ededed;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #999;
    border-bottom: 1px solid #e0e0e0;
}
.preview-scroll {
    max-height: calc(100vh - 220px);
    overflow-y: auto;
    padding: 20px;
}
.theme-preview {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

/* ── Color Variants (placeholder) ── */
.color-hint {
    font-size: 13px;
    color: #999;
    text-align: center;
}

/* ── Action Button ── */
.action-btn {
    width: 100%;
    max-width: 415px;
    padding: 14px 0;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    font-family: inherit;
}
.action-btn:hover { background: #06ae56; }
.action-btn:active { transform: scale(0.99); }
.action-btn.copied {
    background: #34c759;
}

/* ── Font Size Selector ── */
.font-size-selector {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    margin-bottom: 20px;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
}
.fs-label {
    font-size: 13px;
    color: #999;
}
.fs-btn {
    padding: 4px 12px;
    border: 1px solid #ddd;
    border-radius: 16px;
    background: #fff;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}
.fs-btn:hover {
    border-color: #07C160;
    color: #07C160;
}
.fs-btn.active {
    background: #07C160;
    border-color: #07C160;
    color: #fff;
}

/* ── Responsive ── */
@media (max-width: 860px) {
    .main-container {
        flex-direction: column;
        align-items: center;
        max-width: 700px;
    }
    .sidebar {
        width: 100%;
        max-width: 600px;
        position: static;
        max-height: none;
        overflow-y: visible;
    }
    .font-size-selector {
        justify-content: center;
        border-bottom: none;
    }
    .theme-buttons {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
    }
    .theme-group {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
    }
    .group-label {
        border-bottom: none;
        padding-bottom: 0;
        min-width: 60px;
    }
}

@media (max-width: 600px) {
    .toolbar { padding: 10px 14px; }
    .toolbar-hint {
        font-size: 12px;
        max-width: 180px;
        line-height: 1.4;
    }
    .main-container {
        margin-top: 68px;
        padding: 0 12px;
    }
    .sidebar {
        padding: 12px;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
    }
    .theme-buttons {
        flex-direction: column;
    }
    .theme-group {
        flex-direction: column;
    }
    .theme-group-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
    }
    .theme-btn {
        justify-content: center;
    }
    .phone-frame {
        border-radius: 0;
        box-shadow: none;
    }
    .preview-scroll {
        max-height: calc(100vh - 200px);
    }
}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar">
    <div class="toolbar-left">
        <span class="toolbar-title">{{TITLE}}</span>
        <span class="toolbar-meta">{{WORD_COUNT}} 字</span>
    </div>
    <span class="toolbar-hint" id="toolbarHint">切换主题会自动保存，复制后去公众号粘贴</span>
</div>

<!-- ── Main Content ── -->
<div class="main-container">

    <!-- Sidebar: Theme Selection -->
    <div class="sidebar">

        <!-- Font Size Selector -->
        <div class="font-size-selector">
            <span class="fs-label">字号</span>
            <button class="fs-btn active" data-size="15" onclick="switchFontSize(15)">15px</button>
            <button class="fs-btn" data-size="16" onclick="switchFontSize(16)">16px</button>
        </div>

        <!-- Theme Buttons -->
        <div class="theme-buttons">
{{THEME_BUTTONS}}
        </div>

    </div>

    <!-- Preview Panel -->
    <div class="preview-panel">

        <!-- Phone Frame Preview -->
        <div class="phone-frame">
            <div class="phone-header">微信公众号预览</div>
            <div class="preview-scroll" id="previewScroll">
{{THEME_PREVIEWS}}
            </div>
        </div>

        <!-- Action Buttons -->
        <button class="action-btn" id="copyBtn" onclick="applyTheme()">复制内容到剪贴板 去公众号粘贴</button>

    </div>

</div>

<script>
var selectedTheme = '{{DEFAULT_THEME}}';

function setToolbarHint(message, isError) {
    var hint = document.getElementById('toolbarHint');
    if (!hint) return;
    hint.textContent = message;
    hint.style.color = isError ? '#d93025' : '#07c160';
}

function saveSelectedTheme(themeId) {
    try {
        localStorage.setItem('wechat-format-theme', themeId);
    } catch (e) {
        setToolbarHint('当前主题已切换，但浏览器未能记住这次选择', true);
        return;
    }
    setToolbarHint('已在当前浏览器记住这个主题，复制后去公众号粘贴', false);
}

function switchTheme(themeId) {
    // Hide all previews
    var previews = document.querySelectorAll('.theme-preview');
    for (var i = 0; i < previews.length; i++) {
        previews[i].style.display = 'none';
    }
    // Show target
    var target = document.querySelector('.theme-preview[data-theme="' + themeId + '"]');
    if (target) {
        target.style.display = 'block';
    }
    // Update button active states
    var btns = document.querySelectorAll('.theme-btn');
    for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute('data-theme') === themeId) {
            btns[i].classList.add('active');
        } else {
            btns[i].classList.remove('active');
        }
    }
    // Update selected theme and persist locally for the user's next Claude turn
    selectedTheme = themeId;
    saveSelectedTheme(themeId);
    // Scroll preview to top
    document.getElementById('previewScroll').scrollTop = 0;
}

function copyCurrentPreview() {
    var target = document.querySelector('.theme-preview[data-theme="' + selectedTheme + '"]');
    if (!target) return false;

    // Temporarily make it selectable
    var range = document.createRange();
    range.selectNodeContents(target);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    var success = false;
    try {
        success = document.execCommand('copy');
    } catch(e) {}

    sel.removeAllRanges();

    if (!success) {
        // Fallback: Clipboard API
        var html = target.innerHTML;
        var blob = new Blob([html], { type: 'text/html' });
        var item = new ClipboardItem({ 'text/html': blob });
        navigator.clipboard.write([item]).then(function() {
            showCopied();
        }).catch(function() {
            alert('复制失败，请手动选中文章内容复制');
        });
        return;
    }

    showCopied();
}

function applyTheme() {
    copyCurrentPreview();
}

function showCopied() {
    var btn = document.getElementById('copyBtn');
    var themeName = '';
    var activeBtn = document.querySelector('.theme-btn.active');
    if (activeBtn) {
        themeName = activeBtn.textContent.replace('推荐', '').trim();
    }
    btn.textContent = '已复制「' + themeName + '」到剪贴板 ✓';
    btn.classList.add('copied');
    setTimeout(function() {
        btn.textContent = '复制内容到剪贴板 去公众号粘贴';
        btn.classList.remove('copied');
    }, 3000);
}

function switchFontSize(size) {
    // 更新按钮状态
    document.querySelectorAll('.fs-btn').forEach(function(btn) {
        if (parseInt(btn.dataset.size) === size) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    // 找到所有预览区，修改 p 标签的 font-size
    document.querySelectorAll('.theme-preview').forEach(function(preview) {
        preview.querySelectorAll('p').forEach(function(p) {
            var currentSize = parseInt(window.getComputedStyle(p).fontSize);
            if (currentSize >= 14 && currentSize <= 16) {
                p.style.fontSize = size + 'px';
                p.style.lineHeight = size === 16 ? '1.75' : '1.8';
            }
        });
        // 修改列表项文字
        preview.querySelectorAll('[style*="font-size:15px"]').forEach(function(el) {
            if (el.tagName === 'SPAN' || el.tagName === 'SECTION') {
                el.style.fontSize = size + 'px';
            }
        });
    });

    // 保存选择到 localStorage
    localStorage.setItem('wechat-format-fontsize', size);
}

// 页面加载时恢复上次选择
document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('wechat-format-fontsize');
    if (saved && saved !== '15') {
        switchFontSize(parseInt(saved));
    }

    var savedTheme = null;
    try {
        savedTheme = localStorage.getItem('wechat-format-theme');
    } catch (e) {}

    if (savedTheme && document.querySelector('.theme-btn[data-theme="' + savedTheme + '"]')) {
        switchTheme(savedTheme);
    } else {
        setToolbarHint('会在当前浏览器记住你上次选过的主题，复制后去公众号粘贴', false);
    }
});

// ESC does nothing special here (no overlay)
</script>
</body>
</html>
